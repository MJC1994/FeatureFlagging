[build]
  command = "npm run build"
  publish = "dist/client"

# Proxy Flagdeck API to the Cloudflare Worker (auth + brand runtime API)
[[redirects]]
  from = "/api/*"
  to = "https://flagdeck.niblr.workers.dev/api/:splat"
  status = 200
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
